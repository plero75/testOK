<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Boss du Frais</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;font-family:Arial,sans-serif;background:#08213b;color:white;text-align:center}body{min-height:100svh;background:radial-gradient(circle at top,#f0ffff,#6ed5ef 34%,#08213b 78%);overflow-x:hidden}.wrap{width:100%;max-width:680px;margin:0 auto;padding:calc(12px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));min-height:100svh;display:flex;align-items:flex-start;justify-content:center}.card{width:100%;background:rgba(255,255,255,.14);border:2px solid rgba(255,255,255,.38);border-radius:24px;padding:58px 14px 18px;box-shadow:0 25px 80px rgba(0,0,0,.35);backdrop-filter:blur(10px);max-height:calc(100svh - 24px);overflow:auto}.card.compact{padding-top:52px}h1{font-size:clamp(28px,10vw,42px);line-height:.98;margin:8px 0 14px;text-transform:uppercase}p{font-size:clamp(16px,4.4vw,20px);line-height:1.32;margin:10px auto;max-width:560px}.badge{display:inline-block;background:white;color:#063047;border-radius:999px;padding:8px 12px;font-weight:900;font-size:13px}.ice{font-size:58px}.btn{border:0;border-radius:18px;padding:14px 16px;margin:7px;font-size:16px;font-weight:900;background:#fff;color:#063047;cursor:pointer}.btn.dark{background:#06263d;color:white}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.bar{height:26px;background:#fff;border-radius:999px;overflow:hidden;margin:10px}.fill{height:100%;width:50%;background:linear-gradient(90deg,#87f5ff,#006b9b)}.small{opacity:.9;font-size:14px}.leader{background:rgba(0,0,0,.22);padding:12px;border-radius:18px;margin-top:12px;text-align:left}.row{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.16);padding:8px}.music{position:fixed;right:8px;top:calc(8px + env(safe-area-inset-top));z-index:20;background:#fff;color:#063047;border:0;border-radius:999px;padding:9px 11px;font-weight:900;box-shadow:0 8px 20px rgba(0,0,0,.18);max-width:46vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.product{font-size:36px;min-height:74px}.msg{min-height:26px;font-weight:900;font-size:clamp(15px,4.2vw,18px);line-height:1.25}.zone{background:rgba(255,255,255,.18);border-radius:18px;padding:8px;margin:8px 0}.zoneTop{display:flex;justify-content:space-between;font-weight:900;font-size:15px}.danger .fill{background:linear-gradient(90deg,#ffd36e,#ff3b3b)}.warning .fill{background:linear-gradient(90deg,#fff07a,#ff9d00)}input{padding:15px;border-radius:16px;border:0;font-size:18px;text-align:center;width:86%;max-width:360px}.profiles{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.profile{border:2px solid rgba(255,255,255,.45);background:rgba(255,255,255,.16);color:#fff;border-radius:18px;padding:12px 8px;font-weight:900;font-size:15px}.profile .emoji{font-size:34px;display:block;margin-bottom:4px}.selected{background:#fff;color:#063047;transform:scale(1.02)}@media(max-height:760px){.card{padding-top:48px}.ice{font-size:44px}h1{font-size:32px}.product{font-size:32px;min-height:66px}.btn{padding:12px 14px}.bar{height:22px;margin:8px}.zone{padding:7px;margin:6px 0}p{font-size:16px}.profile .emoji{font-size:28px}}</style></head><body><button class="music" onclick="toggleMusic()">🎵 son au 1er clic</button><div class="wrap"><div class="card" id="app"><div class="ice">🚜🧊</div><span class="badge">FERME DU FRAIS</span><h1>Boss du Frais</h1><p>Choisis ton profil de ferme, entre ton prénom, puis passe les épreuves du froid.</p><input id="name" placeholder="Ton prénom"><div class="profiles" id="profiles"></div><button class="btn dark" onclick="start()">Lancer le protocole</button><p class="small">Le son démarre au premier clic. L’autoplay pur est bloqué par Safari/Chrome.</p></div></div><script>let score=0,name='',profile='🐄 Vache fraîche',temp=0,dir=1,timer=null,audio=null,musicInterval=null,found=0,incidents=0,brigadeTime=20,zones=[];const profileList=['🐄 Vache fraîche','🐓 Poule panique','🐐 Chèvre glacée','🐖 Cochon frigo','🐑 Mouton givré','🚜 Fermier du froid'];function renderProfiles(){let box=document.getElementById('profiles');if(!box)return;box.innerHTML=profileList.map(p=>'<button class="profile '+(p===profile?'selected':'')+'" onclick="selectProfile(\''+p+'\')"><span class="emoji">'+p.split(' ')[0]+'</span>'+p.substring(2)+'</button>').join('')}function selectProfile(p){profile=p;startMusic();renderProfiles()}renderProfiles();function app(html,compact=true){document.getElementById('app').className='card '+(compact?'compact':'');document.getElementById('app').innerHTML=html;document.getElementById('app').scrollTop=0}function beep(f,d,t){try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.frequency.value=f;o.type=t||'sine';o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(.0001,c.currentTime);g.gain.exponentialRampToValueAtTime(.075,c.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+d);o.start();o.stop(c.currentTime+d+.03)}catch(e){}}function startMusic(){if(audio)return;try{const c=new(window.AudioContext||window.webkitAudioContext)();let os=[];[146,185,220].forEach((f,i)=>{let o=c.createOscillator(),g=c.createGain();o.type=i?'triangle':'sine';o.frequency.value=f;g.gain.value=.018;o.connect(g);g.connect(c.destination);o.start();os.push(o)});musicInterval=setInterval(()=>beep(880,.08,'square'),2100);audio={stop:()=>{os.forEach(o=>o.stop())}};document.querySelector('.music').innerText='🔇 couper la gêne'}catch(e){}}function toggleMusic(){if(audio){audio.stop();audio=null;clearInterval(musicInterval);document.querySelector('.music').innerText='🎵 activer son';return}startMusic()}function start(){startMusic();name=document.getElementById('name')?.value||'Anonyme';score=0;showIntro(1,'Thermomètre Fou','Arrête la jauge le plus près possible de 4°C. Plus tu es proche, plus tu marques de points.',gameTemp)}function showIntro(n,t,txt,next){app('<span class="badge">'+profile+'</span><h1>'+t+'</h1><p>'+txt+'</p><button class="btn dark" id="nextBtn">J’ai compris</button>');document.getElementById('nextBtn').onclick=()=>{startMusic();next()}}function gameTemp(){temp=12;dir=-1;app('<span class="badge">ÉPREUVE 1</span><h1>Thermomètre Fou</h1><p>Objectif : 4°C.</p><div class="bar"><div class="fill" id="fill"></div></div><h2 id="t">12°C</h2><button class="btn dark" onclick="stopTemp()">STOP</button>');timer=setInterval(()=>{temp+=dir*.35;if(temp<=-2||temp>=12)dir*=-1;document.getElementById('t').innerText=temp.toFixed(1)+'°C';document.getElementById('fill').style.width=Math.max(0,Math.min(100,(temp+2)/14*100))+'%'},40)}function stopTemp(){clearInterval(timer);let pts=Math.max(0,Math.round(100-Math.abs(temp-4)*20));score+=pts;beep(pts>75?660:180,.2,'sawtooth');showIntro(2,'Tri de Glacière','Clique uniquement les produits qui doivent rester au frais. Dès que tous les bons produits sont sécurisés, on passe à la suite.',gameProducts)}function gameProducts(){found=0;let items=['🥓','🧀','🥬','🥛','🧻','☀️','🍷','📱','🍪','🧊'];let html='<span class="badge">ÉPREUVE 2</span><h1>Tri de Glacière</h1><p>Clique les produits frais uniquement.</p><div class="msg" id="msg">0 / 5 produits sécurisés</div><div class="grid">';items.forEach(x=>html+='<button class="btn product" onclick="pick(\''+x+'\',this)">'+x+'</button>');html+='</div>';app(html)}function pick(x,el){let good=['🥓','🧀','🥬','🥛','🧊'];if(good.includes(x)){if(el.disabled)return;found++;score+=25;el.disabled=true;el.style.opacity=.35;document.getElementById('msg').innerText=found+' / 5 produits sécurisés';beep(520,.12,'square');if(found>=5){setTimeout(()=>showIntro(3,'Brigade du Froid','Surveille les jauges. Clique sur les zones qui chauffent trop pour les refroidir. Tiens 20 secondes sans chaos thermique.',gameBrigade),450)}}else{score-=15;document.getElementById('msg').innerText='Erreur : '+x+' ne demande pas la chaîne du froid.';beep(120,.16,'square');el.style.transform='rotate(-4deg)'}}function gameBrigade(){brigadeTime=20;incidents=0;zones=[{n:'Glacière viande',v:35},{n:'Fromage nerveux',v:30},{n:'Salade composée',v:40},{n:'Rosé diplomatique',v:28},{n:'Participants en surchauffe',v:32}];renderBrigade();timer=setInterval(tickBrigade,700)}function renderBrigade(){let html='<span class="badge">ÉPREUVE 3</span><h1>Brigade du Froid</h1><p>Temps restant : <b>'+brigadeTime+'</b>s | Incidents : <b>'+incidents+'</b></p><div>';zones.forEach((z,i)=>{let cls=z.v>90?'danger':z.v>70?'warning':'';html+='<div class="zone '+cls+'" onclick="cool('+i+')"><div class="zoneTop"><span>'+z.n+'</span><span>'+Math.round(z.v)+'%</span></div><div class="bar"><div class="fill" style="width:'+z.v+'%"></div></div></div>'});html+='</div>';app(html)}function tickBrigade(){brigadeTime--;zones.forEach(z=>z.v+=Math.random()*16+5);zones.forEach(z=>{if(z.v>=100){incidents++;score-=20;z.v=55;beep(100,.18,'sawtooth')}});if(brigadeTime<=0){clearInterval(timer);let pts=Math.max(0,160-incidents*35);score+=pts;end();return}renderBrigade()}function cool(i){zones[i].v=Math.max(8,zones[i].v-38);score+=8;beep(740,.06,'triangle');renderBrigade()}function end(){let scores=JSON.parse(localStorage.getItem('bf_scores')||'[]');scores.push({name,profile,score,date:new Date().toLocaleString('fr-FR')});scores.sort((a,b)=>b.score-a.score);localStorage.setItem('bf_scores',JSON.stringify(scores));let title=scores[0].name===name&&score===scores[0].score?'👑 BF OFFICIEL':'🌡️ CANDIDAT FRAIS';let rows=scores.slice(0,10).map((s,i)=>'<div class="row"><b>#'+(i+1)+' '+(s.profile||'🧊')+' '+s.name+'</b><span>'+s.score+' pts</span></div>').join('');app('<span class="badge">RÉSULTAT CONSOLIDÉ</span><h1>'+title+'</h1><div class="ice">'+(title.includes('BF')?'👑🧊':'🧊')+'</div><p>'+profile+' '+name+' : <b>'+score+' points</b></p><p class="small">Classement local à cet appareil. Le vrai classement en ligne nécessite Supabase.</p><div class="leader">'+rows+'</div><button class="btn dark" onclick="location.reload()">Rejouer</button><button class="btn" onclick="navigator.clipboard.writeText(\''+profile+' '+name+' : '+score+' points au protocole BF 🧊\')">Copier résultat</button>')}</script></body></html>
