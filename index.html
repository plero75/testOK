<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Boss du Frais</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;font-family:Arial,sans-serif;background:#08213b;color:white;text-align:center}body{min-height:100svh;background:radial-gradient(circle at top,#f0ffff,#6ed5ef 34%,#08213b 78%);overflow-x:hidden}.wrap{width:100%;max-width:680px;margin:0 auto;padding:calc(12px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));min-height:100svh;display:flex;align-items:flex-start;justify-content:center}.card{width:100%;background:rgba(255,255,255,.14);border:2px solid rgba(255,255,255,.38);border-radius:24px;padding:58px 14px 18px;box-shadow:0 25px 80px rgba(0,0,0,.35);backdrop-filter:blur(10px);max-height:calc(100svh - 24px);overflow:auto}.compact{padding-top:52px}h1{font-size:clamp(27px,9vw,42px);line-height:.98;margin:8px 0 14px;text-transform:uppercase}p{font-size:clamp(16px,4.2vw,20px);line-height:1.32;margin:10px auto;max-width:560px}.badge{display:inline-block;background:white;color:#063047;border-radius:999px;padding:8px 12px;font-weight:900;font-size:13px}.ice{font-size:56px}.btn{border:0;border-radius:18px;padding:14px 16px;margin:7px;font-size:16px;font-weight:900;background:#fff;color:#063047;cursor:pointer}.btn.dark{background:#06263d;color:white}.btn:disabled{opacity:.45;cursor:not-allowed}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.bar{height:26px;background:#fff;border-radius:999px;overflow:hidden;margin:10px}.fill{height:100%;width:50%;background:linear-gradient(90deg,#87f5ff,#006b9b)}.small{opacity:.9;font-size:14px}.leader{background:rgba(0,0,0,.22);padding:12px;border-radius:18px;margin-top:12px;text-align:left}.row{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid rgba(255,255,255,.16);padding:8px}.music{position:fixed;right:8px;top:calc(8px + env(safe-area-inset-top));z-index:20;background:#fff;color:#063047;border:0;border-radius:999px;padding:9px 11px;font-weight:900;box-shadow:0 8px 20px rgba(0,0,0,.18);max-width:46vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.product{font-size:36px;min-height:74px}.msg{min-height:26px;font-weight:900;font-size:clamp(15px,4.2vw,18px);line-height:1.25}.zone{background:rgba(255,255,255,.18);border-radius:18px;padding:8px;margin:8px 0}.zoneTop{display:flex;justify-content:space-between;font-weight:900;font-size:15px}.danger .fill{background:linear-gradient(90deg,#ffd36e,#ff3b3b)}.warning .fill{background:linear-gradient(90deg,#fff07a,#ff9d00)}.profiles,.people{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.profile,.person{border:2px solid rgba(255,255,255,.45);background:rgba(255,255,255,.16);color:#fff;border-radius:18px;padding:12px 8px;font-weight:900;font-size:15px}.profile .emoji{font-size:34px;display:block;margin-bottom:4px}.selected{background:#fff;color:#063047;transform:scale(1.02)}.played{opacity:.45;text-decoration:line-through}.scorebox{background:rgba(255,255,255,.18);border-radius:18px;padding:12px;margin:12px 0;font-weight:900}@media(max-height:760px){.card{padding-top:48px}.ice{font-size:42px}h1{font-size:31px}.product{font-size:32px;min-height:66px}.btn{padding:12px 14px}.bar{height:22px;margin:8px}.zone{padding:7px;margin:6px 0}p{font-size:16px}.profile .emoji{font-size:28px}}</style></head><body><button class="music" onclick="toggleMusic()">🎵 son au 1er clic</button><div class="wrap"><div class="card" id="app"></div></div><script>let score=0,stageScores=[],name='Paul',profile='🐄 Vache fraîche',temp=0,dir=1,timer=null,audio=null,musicInterval=null,found=0,incidents=0,brigadeTime=20,zones=[];const participants=['Paul','Loïc','Claire','Damien','Maïté','Gab','Flavie','Marion'];const profileList=['🐄 Vache fraîche','🐓 Poule panique','🐐 Chèvre glacée','🐖 Cochon frigo','🐑 Mouton givré','🚜 Fermier du froid'];const voiceLines={Paul:'Allez go go Paul, chef de glacière, le frais attend ton commandement.',Loïc:'Allez Loïc, pas de débat, pas de tiédeur, tu entres dans la chaîne du froid.',Claire:'Go Claire, précision maximale, la salade composée te regarde.',Damien:'Damien, opération congélateur mental activée, fais parler le thermomètre.',Maïté:'Maïté, le froid t’appelle, avance avec dignité et contrôle thermique.',Gab:'Gab, c’est ton moment, sécurise le jambon et impose le respect frigorifique.',Flavie:'Flavie, alerte poulpe et produits frais, tu prends le contrôle de la glacière.',Marion:'Allez go go Marion, montre à la ferme qui commande vraiment le froid.'};function getScores(){return JSON.parse(localStorage.getItem('bf_scores')||'[]').filter(s=>participants.includes(s.name))}function setScores(scores){localStorage.setItem('bf_scores',JSON.stringify(scores.filter(s=>participants.includes(s.name))))}function ranked(){return getScores().sort((a,b)=>b.score-a.score)}function hasPlayed(p){return getScores().some(s=>s.name===p)}function app(html,compact=true){let el=document.getElementById('app');el.className='card '+(compact?'compact':'');el.innerHTML=html;el.scrollTop=0}function boot(){if(!participants.includes(name))name='Paul';let people=participants.map(p=>'<button class="person '+(p===name?'selected ':'')+(hasPlayed(p)?'played':'')+'" onclick="selectPerson(\''+p+'\')">'+p+(hasPlayed(p)?' ✓':'')+'</button>').join('');let prof=profileList.map(p=>'<button class="profile '+(p===profile?'selected':'')+'" onclick="selectProfile(\''+p+'\')"><span class="emoji">'+p.split(' ')[0]+'</span>'+p.substring(2)+'</button>').join('');let locked=hasPlayed(name);app('<div class="ice">🚜🧊</div><span class="badge">FERME DU FRAIS</span><h1>Boss du Frais</h1><p>Choisis ton participant et ton profil de ferme. Une seule participation est autorisée par personne.</p><div class="people">'+people+'</div><div class="profiles">'+prof+'</div><button class="btn dark" onclick="start()" '+(locked?'disabled':'')+'>'+(locked?'Participation déjà enregistrée':'Lancer le protocole')+'</button><button class="btn" onclick="showFinalRanking()">Voir classement général</button><p class="small">Les participants sont uniquement : Paul, Loïc, Claire, Damien, Maïté, Gab, Flavie et Marion. Une fois joué, c’est verrouillé.</p>',false)}function selectPerson(p){name=p;startMusic();boot()}function selectProfile(p){profile=p;startMusic();boot()}function beep(f,d,t){try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.frequency.value=f;o.type=t||'sine';o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(.0001,c.currentTime);g.gain.exponentialRampToValueAtTime(.075,c.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+d);o.start();o.stop(c.currentTime+d+.03)}catch(e){}}function speak(txt){try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(txt);u.lang='fr-FR';u.rate=.98;u.pitch=1.25;u.volume=1;speechSynthesis.speak(u)}catch(e){}}function cheer(){speak(voiceLines[name]||('Allez go go '+name+', le froid compte sur toi.'))}function startMusic(){if(audio)return;try{const c=new(window.AudioContext||window.webkitAudioContext)();let os=[];[146,185,220].forEach((f,i)=>{let o=c.createOscillator(),g=c.createGain();o.type=i?'triangle':'sine';o.frequency.value=f;g.gain.value=.014;o.connect(g);g.connect(c.destination);o.start();os.push(o)});musicInterval=setInterval(()=>beep(880,.08,'square'),2100);audio={stop:()=>{os.forEach(o=>o.stop())}};document.querySelector('.music').innerText='🔇 couper la gêne'}catch(e){}}function toggleMusic(){if(audio){audio.stop();audio=null;clearInterval(musicInterval);speechSynthesis.cancel();document.querySelector('.music').innerText='🎵 activer son';return}startMusic();cheer()}function start(){if(hasPlayed(name)){showFinalRanking();return}startMusic();cheer();score=0;stageScores=[];showIntro(1,'Thermomètre Fou','Arrête la jauge le plus près possible de 4°C. Plus tu es proche, plus tu marques de points.',gameTemp)}function showIntro(n,t,txt,next){app('<span class="badge">'+profile+' · '+name+'</span><h1>'+t+'</h1><p>'+txt+'</p><button class="btn dark" id="nextBtn">J’ai compris</button>');document.getElementById('nextBtn').onclick=()=>{startMusic();next()}}function stageResult(title,pts,next){stageScores.push(pts);let tempScores=getScores();tempScores.push({name,profile,score,date:new Date().toLocaleString('fr-FR'),draft:true});tempScores.sort((a,b)=>b.score-a.score);let myRank=tempScores.findIndex(s=>s.name===name&&s.draft)+1;let rows=tempScores.slice(0,8).map((s,i)=>'<div class="row"><b>#'+(i+1)+' '+(s.profile||'🧊')+' '+s.name+(s.draft?' (en cours)':'')+'</b><span>'+s.score+' pts</span></div>').join('');app('<span class="badge">POINT ÉTAPE</span><h1>'+title+'</h1><div class="scorebox">+'+pts+' pts<br>Total : '+score+' pts<br>Classement provisoire : #'+myRank+'</div><div class="leader">'+rows+'</div><button class="btn dark" id="nextBtn">Continuer</button>');document.getElementById('nextBtn').onclick=next}function gameTemp(){temp=12;dir=-1;app('<span class="badge">ÉPREUVE 1</span><h1>Thermomètre Fou</h1><p>Objectif : 4°C.</p><div class="bar"><div class="fill" id="fill"></div></div><h2 id="t">12°C</h2><button class="btn dark" onclick="stopTemp()">STOP</button>');timer=setInterval(()=>{temp+=dir*.35;if(temp<=-2||temp>=12)dir*=-1;document.getElementById('t').innerText=temp.toFixed(1)+'°C';document.getElementById('fill').style.width=Math.max(0,Math.min(100,(temp+2)/14*100))+'%'},40)}function stopTemp(){clearInterval(timer);let pts=Math.max(0,Math.round(100-Math.abs(temp-4)*20));score+=pts;beep(pts>75?660:180,.2,'sawtooth');stageResult('Thermomètre validé',pts,()=>showIntro(2,'Tri de Glacière','Clique uniquement les produits qui doivent rester au frais. Dès que tous les bons produits sont sécurisés, on passe à la suite.',gameProducts))}function gameProducts(){found=0;let items=['🥓','🧀','🥬','🥛','🧻','☀️','🍷','📱','🍪','🧊'];let html='<span class="badge">ÉPREUVE 2</span><h1>Tri de Glacière</h1><p>Clique les produits frais uniquement.</p><div class="msg" id="msg">0 / 5 produits sécurisés</div><div class="grid">';items.forEach(x=>html+='<button class="btn product" onclick="pick(\''+x+'\',this)">'+x+'</button>');html+='</div>';app(html)}function pick(x,el){let good=['🥓','🧀','🥬','🥛','🧊'];if(good.includes(x)){if(el.disabled)return;found++;score+=25;el.disabled=true;el.style.opacity=.35;document.getElementById('msg').innerText=found+' / 5 produits sécurisés';beep(520,.12,'square');if(found>=5){setTimeout(()=>stageResult('Glacière sécurisée',125,()=>showIntro(3,'Brigade du Froid','Surveille les jauges. Clique sur les zones qui chauffent trop pour les refroidir. Tiens 20 secondes sans chaos thermique.',gameBrigade)),450)}}else{score-=15;document.getElementById('msg').innerText='Erreur : '+x+' ne demande pas la chaîne du froid.';beep(120,.16,'square');el.style.transform='rotate(-4deg)'}}function gameBrigade(){brigadeTime=20;incidents=0;zones=[{n:'Glacière viande',v:35},{n:'Fromage nerveux',v:30},{n:'Salade composée',v:40},{n:'Rosé diplomatique',v:28},{n:'Participants en surchauffe',v:32}];renderBrigade();timer=setInterval(tickBrigade,700)}function renderBrigade(){let html='<span class="badge">ÉPREUVE 3</span><h1>Brigade du Froid</h1><p>Temps restant : <b>'+brigadeTime+'</b>s | Incidents : <b>'+incidents+'</b></p><div>';zones.forEach((z,i)=>{let cls=z.v>90?'danger':z.v>70?'warning':'';html+='<div class="zone '+cls+'" onclick="cool('+i+')"><div class="zoneTop"><span>'+z.n+'</span><span>'+Math.round(z.v)+'%</span></div><div class="bar"><div class="fill" style="width:'+z.v+'%"></div></div></div>'});html+='</div>';app(html)}function tickBrigade(){brigadeTime--;zones.forEach(z=>z.v+=Math.random()*16+5);zones.forEach(z=>{if(z.v>=100){incidents++;score-=20;z.v=55;beep(100,.18,'sawtooth')}});if(brigadeTime<=0){clearInterval(timer);let pts=Math.max(0,160-incidents*35);score+=pts;stageResult('Brigade terminée',pts,end);return}renderBrigade()}function cool(i){zones[i].v=Math.max(8,zones[i].v-38);score+=8;beep(740,.06,'triangle');renderBrigade()}function saveFinal(){let scores=getScores();if(scores.some(s=>s.name===name))return scores; scores.push({name,profile,score,stages:stageScores,date:new Date().toLocaleString('fr-FR')});scores.sort((a,b)=>b.score-a.score);setScores(scores);return scores}function end(){let scores=saveFinal();let myRank=scores.findIndex(s=>s.name===name)+1;let title=myRank===1?'👑 BF OFFICIEL':'🌡️ CANDIDAT FRAIS';let rows=scores.map((s,i)=>'<div class="row"><b>#'+(i+1)+' '+(s.profile||'🧊')+' '+s.name+'</b><span>'+s.score+' pts</span></div>').join('');speak(myRank===1?'Nomination officielle. '+name+' devient Boss du Frais.':'Fin du protocole pour '+name+'. Classement numéro '+myRank+'.');app('<span class="badge">CLASSEMENT GÉNÉRAL</span><h1>'+title+'</h1><div class="ice">'+(myRank===1?'👑🧊':'🧊')+'</div><p>'+profile+' '+name+' : <b>'+score+' points</b><br>Rang final : <b>#'+myRank+'</b></p><div class="leader">'+rows+'</div><button class="btn dark" onclick="boot()">Retour accueil</button><button class="btn" onclick="navigator.clipboard.writeText(\''+profile+' '+name+' : '+score+' points au protocole BF 🧊 Rang #'+myRank+'\')">Copier résultat</button>')}function showFinalRanking(){let scores=ranked();let rows=scores.length?scores.map((s,i)=>'<div class="row"><b>#'+(i+1)+' '+(s.profile||'🧊')+' '+s.name+'</b><span>'+s.score+' pts</span></div>').join(''):'<p>Aucun participant enregistré pour le moment.</p>';app('<span class="badge">CLASSEMENT GÉNÉRAL</span><h1>Tableau du froid</h1><div class="leader">'+rows+'</div><button class="btn dark" onclick="boot()">Retour</button>')}boot()</script></body></html>
