<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Boss du Frais</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;font-family:Arial,sans-serif;background:#08213b;color:white;text-align:center}body{min-height:100svh;background:linear-gradient(180deg,rgba(5,25,43,.35),rgba(4,18,32,.92)),radial-gradient(circle at top,#d9fbff,#74d6ee 34%,#08213b 78%);overflow-x:hidden}.wrap{width:100%;max-width:720px;margin:0 auto;padding:calc(12px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));min-height:100svh;display:flex;align-items:flex-start;justify-content:center}.card{width:100%;background:rgba(6,35,60,.78);border:3px solid rgba(255,255,255,.72);border-radius:28px;padding:68px 14px 18px;box-shadow:0 26px 90px rgba(0,0,0,.38),inset 0 0 0 2px rgba(117,214,238,.35);backdrop-filter:blur(10px);max-height:calc(100svh - 24px);overflow:auto;position:relative}.card:before{content:'FRAIS ATTITUDE · ZÉRO COMPROMIS';position:absolute;left:12px;top:14px;border:2px dashed rgba(255,255,255,.7);border-radius:999px;padding:7px 10px;font-size:11px;font-weight:900;color:#fff;transform:rotate(-4deg)}.compact{padding-top:62px}h1{font-family:Impact,Arial Black,Arial,sans-serif;font-size:clamp(32px,10vw,52px);line-height:.92;margin:8px 0 12px;text-transform:uppercase;letter-spacing:1px;text-shadow:0 4px 0 #0b3150,0 8px 18px rgba(0,0,0,.35)}p{font-size:clamp(16px,4.2vw,20px);line-height:1.32;margin:10px auto;max-width:580px}.badge{display:inline-block;background:#fff;color:#063047;border-radius:999px;padding:8px 12px;font-weight:900;font-size:13px;border:2px solid #0b3150;box-shadow:0 4px 0 rgba(0,0,0,.18)}.ribbon{display:inline-block;background:#ffd64d;color:#08213b;padding:8px 13px;border-radius:10px;font-weight:900;transform:rotate(-1deg);box-shadow:0 4px 0 rgba(0,0,0,.18);text-transform:uppercase}.ice{font-size:56px}.btn{border:0;border-radius:18px;padding:14px 16px;margin:7px;font-size:16px;font-weight:900;background:#fff;color:#063047;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.18)}.btn.dark{background:#06263d;color:white;border:2px solid rgba(255,255,255,.35)}.btn:disabled{opacity:.45;cursor:not-allowed}.launch{width:92%;max-width:430px;margin:18px auto 8px;display:block;border:3px solid #fff;border-radius:24px;padding:18px 16px;background:linear-gradient(180deg,#eaffff,#7ff1ff 46%,#0a4f78);color:#05263e;font-size:22px;font-weight:1000;text-transform:uppercase;letter-spacing:.5px;box-shadow:0 9px 0 #041d31,0 0 28px rgba(135,245,255,.7),inset 0 0 18px rgba(255,255,255,.9);text-shadow:0 1px 0 white;animation:frostPulse 1.4s ease-in-out infinite}.launch:disabled{animation:none;background:#9bb3bd;color:#31505e;box-shadow:0 5px 0 #263b45}.launch span{display:block;font-size:13px;margin-top:4px;letter-spacing:1px;color:#063047}@keyframes frostPulse{0%,100%{transform:translateY(0);filter:brightness(1)}50%{transform:translateY(-2px);filter:brightness(1.12)}}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.bar{height:26px;background:#fff;border-radius:999px;overflow:hidden;margin:10px;border:2px solid rgba(6,35,60,.35)}.fill{height:100%;width:50%;background:linear-gradient(90deg,#87f5ff,#006b9b)}.small{opacity:.9;font-size:14px}.leader{background:rgba(255,255,255,.13);padding:12px;border-radius:18px;margin-top:12px;text-align:left;border:2px solid rgba(255,255,255,.22)}.row{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid rgba(255,255,255,.16);padding:8px}.music{position:fixed;right:8px;top:calc(8px + env(safe-area-inset-top));z-index:20;background:#fff;color:#063047;border:0;border-radius:999px;padding:9px 11px;font-weight:900;box-shadow:0 8px 20px rgba(0,0,0,.18);max-width:46vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.product{font-size:36px;min-height:74px}.msg{min-height:26px;font-weight:900;font-size:clamp(15px,4.2vw,18px);line-height:1.25;background:rgba(255,255,255,.14);border-radius:14px;padding:8px}.zone{background:rgba(255,255,255,.18);border-radius:18px;padding:8px;margin:8px 0;border:2px solid rgba(255,255,255,.22)}.zoneTop{display:flex;justify-content:space-between;font-weight:900;font-size:15px}.danger .fill{background:linear-gradient(90deg,#ffd36e,#ff3b3b)}.warning .fill{background:linear-gradient(90deg,#fff07a,#ff9d00)}.people{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.person{border:2px solid rgba(255,255,255,.55);background:rgba(255,255,255,.16);color:#fff;border-radius:18px;padding:15px 8px;font-weight:900;font-size:20px;box-shadow:0 4px 0 rgba(0,0,0,.15)}.selected{background:#fff;color:#063047;transform:scale(1.02)}.played{opacity:.45;text-decoration:line-through}.scorebox{background:rgba(255,255,255,.18);border-radius:18px;padding:12px;margin:12px 0;font-weight:900;border:2px solid rgba(255,255,255,.22)}.comment{background:#fff;color:#063047;border-radius:18px;padding:12px;margin:12px auto;font-weight:900;max-width:560px;box-shadow:0 6px 0 rgba(0,0,0,.18);transform:rotate(-1deg)}.podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;align-items:end;gap:8px;margin:18px 0}.step{border-radius:18px 18px 10px 10px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.35);padding:10px 6px;font-weight:900;animation:rise .7s ease both}.step.first{min-height:150px;background:rgba(255,214,77,.34);animation-delay:.2s}.step.second{min-height:115px;animation-delay:.45s}.step.third{min-height:90px;animation-delay:.65s}.medal{font-size:34px;display:block}.confetti{position:fixed;inset:0;pointer-events:none;z-index:10;background:repeating-linear-gradient(115deg,transparent 0 28px,rgba(255,255,255,.22) 29px 31px);animation:snow 1.2s linear infinite}@keyframes rise{from{transform:translateY(55px);opacity:0}to{transform:translateY(0);opacity:1}}@keyframes snow{from{background-position:0 0}to{background-position:0 80px}}@media(max-height:760px){.card{padding-top:58px}.ice{font-size:42px}h1{font-size:32px}.product{font-size:32px;min-height:66px}.btn{padding:12px 14px}.launch{padding:14px 12px;font-size:19px}.bar{height:22px;margin:8px}.zone{padding:7px;margin:6px 0}p{font-size:16px}.step.first{min-height:125px}.step.second{min-height:100px}}</style></head><body><button class="music" onclick="toggleMusic()">🔊 activer sons</button><div class="wrap"><div class="card" id="app"></div></div><script>let score=0,stageScores=[],name='Paul',temp=0,dir=1,timer=null,audio=null,audioCtx=null,masterGain=null,musicInterval=null,found=0,incidents=0,brigadeTime=20,zones=[],chosenVoice=null;const participants=['Paul','Loïc','Claire','Damien','Maïté','Gab','Flavie','Marion'];const voiceLines={Paul:'Allez go go Paul, chef de glacière, le frais attend ton commandement.',Loïc:'Allez Loïc, pas de débat, pas de tiédeur, tu entres dans la chaîne du froid.',Claire:'Go Claire, précision maximale, la salade composée te regarde.',Damien:'Damien, opération congélateur mental activée, fais parler le thermomètre.',Maïté:'Maïté, le froid t’appelle, avance avec dignité et contrôle thermique.',Gab:'Gab, c’est ton moment, sécurise le jambon et impose le respect frigorifique.',Flavie:'Flavie, alerte poulpe et produits frais, tu prends le contrôle de la glacière.',Marion:'Allez go go Marion, montre à la ferme qui commande vraiment le froid.'};const personalWin={Paul:'Paul vient de verrouiller le frigo avec autorité. On sent la direction générale du frais.',Loïc:'Loïc a coupé court à la tiédeur. Décision nette, froid maintenu.',Claire:'Claire a mis de l’ordre dans le froid. C’est propre, net, sans bavure.',Damien:'Damien a dompté la température. Le thermomètre a demandé une pause.',Maïté:'Maïté impose une maîtrise calme. La chaîne du froid respire mieux.',Gab:'Gab sécurise le périmètre. Le jambon est officiellement rassuré.',Flavie:'Flavie reprend la glacière en main. Les poulpes valident le protocole.',Marion:'Marion entre dans le froid avec panache. La ferme s’incline.'};const personalFail={Paul:'Paul, attention. On a senti le frais hésiter dans le virage.',Loïc:'Loïc, zone de flottement. Le froid demande moins de confiance orale, plus d’action.',Claire:'Claire, petit décrochage thermique. Rien de grave, mais la salade a cligné des yeux.',Damien:'Damien, alerte molle. Le thermomètre n’a pas tout compris.',Maïté:'Maïté, passage délicat. La température globale a levé un sourcil.',Gab:'Gab, le frais a vacillé. Le jambon reste poli mais inquiet.',Flavie:'Flavie, turbulence froide détectée. Les poulpes surveillent le dossier.',Marion:'Marion, petit coup de chaud dans le protocole. On recadre et on repart.'};const comments={thermo:{high:'Très propre. Le thermomètre vient de faire un petit salut militaire.',mid:'Correct. Le froid reste poli, mais il surveille.',low:'Ouille. On a senti une légère panique dans le congélateur.'},tri:{high:'Glacière verrouillée. Le jambon peut dormir tranquille.',mid:'Ça passe, mais le PQ a frôlé le frigo. Ambiance tendue.',low:'Tri fragile. Le comité du froid demande un rapport écrit.'},brigade:{high:'Gestion de crise impeccable. Même le rosé a repris confiance.',mid:'Quelques sueurs froides, mais le dispositif tient debout.',low:'Chaîne du froid secouée. Le camembert a demandé un médiateur.'}};function getScores(){return JSON.parse(localStorage.getItem('bf_scores')||'[]').filter(s=>participants.includes(s.name))}function setScores(scores){localStorage.setItem('bf_scores',JSON.stringify(scores.filter(s=>participants.includes(s.name)).map(s=>({name:s.name,score:s.score,stages:s.stages,date:s.date}))))}function ranked(){return getScores().sort((a,b)=>b.score-a.score)}function hasPlayed(p){return getScores().some(s=>s.name===p)}function app(html,compact=true){let el=document.getElementById('app');el.className='card '+(compact?'compact':'');el.innerHTML=html;el.scrollTop=0}function boot(){document.querySelector('.confetti')?.remove();if(!participants.includes(name))name='Paul';let people=participants.map(p=>'<button class="person '+(p===name?'selected ':'')+(hasPlayed(p)?'played':'')+'" onclick="selectPerson(\''+p+'\')">'+p+(hasPlayed(p)?' ✓':'')+'</button>').join('');let locked=hasPlayed(name);app('<div class="ice">🐧🧊</div><span class="badge">PROTOCOLE OFFICIEL</span><h1>Produits Frais</h1><div class="ribbon">Frais, sous contrôle, en toutes circonstances !</div><p>Choisis ton participant. Une seule participation est autorisée par personne.</p><div class="people">'+people+'</div><button class="launch" onclick="start()" '+(locked?'disabled':'')+'>'+(locked?'🔒 ACCÈS GELÉ':'❄️ DÉCLENCHER LE PROTOCOLE')+'<span>'+(locked?'Participation enregistrée':'Température sous surveillance')+'</span></button><button class="btn" onclick="showFinalRanking()">Voir classement général</button><button class="btn" onclick="showPodium()">Podium officiel</button><p class="small">Zéro laissez-aller. 100% contrôlé. Le moindre écart sera détecté.</p>',false)}function selectPerson(p){name=p;unlockAudio();boot()}function unlockAudio(){try{if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=.9;masterGain.connect(audioCtx.destination)}if(audioCtx.state==='suspended')audioCtx.resume();document.querySelector('.music').innerText='🔊 sons actifs'}catch(e){}}function beep(f,d,t,vol=.22){try{unlockAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=f;o.type=t||'sine';o.connect(g);g.connect(masterGain);g.gain.setValueAtTime(.0001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(vol,audioCtx.currentTime+.015);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d+.03)}catch(e){}}function crowd(ok=true){let n=ok?18:9;for(let i=0;i<n;i++){setTimeout(()=>beep((ok?320:95)+Math.random()*220,.07,ok?'triangle':'sawtooth',ok?.18:.2),i*48)}}function fanfare(){[392,523,659,784,1046,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.2,'triangle',.28),i*135))}function applause(){for(let i=0;i<34;i++){setTimeout(()=>beep(90+Math.random()*160,.05,'sawtooth',.24),i*42)}}function iceHit(){[880,1320,1760].forEach((f,i)=>setTimeout(()=>beep(f,.06,'triangle',.18),i*45))}function badBuzz(){[160,120,90].forEach((f,i)=>setTimeout(()=>beep(f,.13,'sawtooth',.2),i*70))}function pickVoice(){let voices=speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.toLowerCase().startsWith('fr'));chosenVoice=voices.find(v=>/Thomas|Audrey|Amelie|Daniel|Google|Microsoft|Natural|Premium/i.test(v.name))||voices[0]||null}if('speechSynthesis'in window){speechSynthesis.onvoiceschanged=pickVoice;pickVoice()}function speak(txt,after){try{speechSynthesis.cancel();pickVoice();let u=new SpeechSynthesisUtterance(txt);u.lang='fr-FR';u.rate=.88;u.pitch=.92;u.volume=1;if(chosenVoice)u.voice=chosenVoice;if(after)u.onend=after;speechSynthesis.speak(u)}catch(e){if(after)after()}}function cheer(){speak(voiceLines[name]||('Allez go go '+name+', le froid compte sur toi.'))}function startMusic(){unlockAudio();if(audio)return;try{let os=[];[146,185,220].forEach((f,i)=>{let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=i?'triangle':'sine';o.frequency.value=f;g.gain.value=.035;o.connect(g);g.connect(masterGain);o.start();os.push(o)});musicInterval=setInterval(()=>beep(880,.08,'square',.12),2100);audio={stop:()=>{os.forEach(o=>o.stop())}};document.querySelector('.music').innerText='🔇 couper sons'}catch(e){}}function toggleMusic(){if(audio){audio.stop();audio=null;clearInterval(musicInterval);speechSynthesis.cancel();document.querySelector('.music').innerText='🔊 activer sons';return}startMusic();fanfare();cheer()}function start(){if(hasPlayed(name)){showFinalRanking();return}startMusic();fanfare();cheer();score=0;stageScores=[];showIntro(1,'Thermomètre Fou','Arrête la jauge le plus près possible de 4°C. Plus tu es proche, plus tu marques de points.',gameTemp)}function showIntro(n,t,txt,next){app('<span class="badge">'+name+'</span><h1>'+t+'</h1><p>'+txt+'</p><button class="btn dark" id="nextBtn">J’ai compris</button>');document.getElementById('nextBtn').onclick=()=>{startMusic();iceHit();next()}}function commentFor(type,pts){let base;if(type==='thermo')base=pts>=80?comments.thermo.high:pts>=45?comments.thermo.mid:comments.thermo.low;else if(type==='tri')base=pts>=110?comments.tri.high:pts>=70?comments.tri.mid:comments.tri.low;else base=pts>=125?comments.brigade.high:pts>=75?comments.brigade.mid:comments.brigade.low;let bonus=pts>=100?(personalWin[name]||'Très belle maîtrise du froid.'):pts<55?(personalFail[name]||'Attention, le frais réclame une reprise en main.'):'';return bonus?base+' '+bonus:base}function stageResult(title,pts,next,type){stageScores.push(pts);let c=commentFor(type,pts);if(pts>=100)crowd(true);if(pts<55)crowd(false);speak(c);let tempScores=getScores();tempScores.push({name,score,date:new Date().toLocaleString('fr-FR'),draft:true});tempScores.sort((a,b)=>b.score-a.score);let myRank=tempScores.findIndex(s=>s.name===name&&s.draft)+1;let rows=tempScores.slice(0,8).map((s,i)=>'<div class="row"><b>#'+(i+1)+' '+s.name+(s.draft?' (en cours)':'')+'</b><span>'+s.score+' pts</span></div>').join('');app('<span class="badge">POINT ÉTAPE</span><h1>'+title+'</h1><div class="scorebox">+'+pts+' pts<br>Total : '+score+' pts<br>Classement provisoire : #'+myRank+'</div><div class="comment">'+c+'</div><div class="leader">'+rows+'</div><button class="btn dark" id="nextBtn">Continuer</button>');document.getElementById('nextBtn').onclick=()=>{iceHit();next()}}function gameTemp(){temp=12;dir=-1;app('<span class="badge">ÉPREUVE 1</span><h1>Thermomètre Fou</h1><p>Objectif : 4°C.</p><div class="bar"><div class="fill" id="fill"></div></div><h2 id="t">12°C</h2><button class="btn dark" onclick="stopTemp()">STOP</button>');timer=setInterval(()=>{temp+=dir*.35;if(temp<=-2||temp>=12)dir*=-1;document.getElementById('t').innerText=temp.toFixed(1)+'°C';document.getElementById('fill').style.width=Math.max(0,Math.min(100,(temp+2)/14*100))+'%'},40)}function stopTemp(){clearInterval(timer);let pts=Math.max(0,Math.round(100-Math.abs(temp-4)*20));score+=pts;beep(pts>75?660:180,.2,'sawtooth',.3);stageResult('Thermomètre validé',pts,()=>showIntro(2,'Tri de Glacière','Clique uniquement les produits qui doivent rester au frais. Dès que tous les bons produits sont sécurisés, on passe à la suite.',gameProducts),'thermo')}function gameProducts(){found=0;let items=['🥓','🧀','🥬','🥛','🧻','☀️','🍷','📱','🍪','🧊'];let html='<span class="badge">ÉPREUVE 2</span><h1>Tri de Glacière</h1><p>Clique les produits frais uniquement.</p><div class="msg" id="msg">0 / 5 produits sécurisés</div><div class="grid">';items.forEach(x=>html+='<button class="btn product" onclick="pick(\''+x+'\',this)">'+x+'</button>');html+='</div>';app(html)}function pick(x,el){let good=['🥓','🧀','🥬','🥛','🧊'];if(good.includes(x)){if(el.disabled)return;found++;score+=25;el.disabled=true;el.style.opacity=.35;document.getElementById('msg').innerText=found+' / 5 produits sécurisés';iceHit();if(found>=5){setTimeout(()=>stageResult('Glacière sécurisée',125,()=>showIntro(3,'Brigade du Froid','Surveille les jauges. Clique sur les zones qui chauffent trop pour les refroidir. Tiens 20 secondes sans chaos thermique.',gameBrigade),'tri'),450)}}else{score-=15;document.getElementById('msg').innerText='Erreur : '+x+' ne demande pas la chaîne du froid.';badBuzz();el.style.transform='rotate(-4deg)'}}function gameBrigade(){brigadeTime=20;incidents=0;zones=[{n:'Glacière viande',v:35},{n:'Fromage nerveux',v:30},{n:'Salade composée',v:40},{n:'Rosé diplomatique',v:28},{n:'Participants en surchauffe',v:32}];renderBrigade();timer=setInterval(tickBrigade,700)}function renderBrigade(){let html='<span class="badge">ÉPREUVE 3</span><h1>Brigade du Froid</h1><p>Temps restant : <b>'+brigadeTime+'</b>s | Incidents : <b>'+incidents+'</b></p><div>';zones.forEach((z,i)=>{let cls=z.v>90?'danger':z.v>70?'warning':'';html+='<div class="zone '+cls+'" onclick="cool('+i+')"><div class="zoneTop"><span>'+z.n+'</span><span>'+Math.round(z.v)+'%</span></div><div class="bar"><div class="fill" style="width:'+z.v+'%"></div></div></div>'});html+='</div>';app(html)}function tickBrigade(){brigadeTime--;zones.forEach(z=>z.v+=Math.random()*16+5);zones.forEach(z=>{if(z.v>=100){incidents++;score-=20;z.v=55;badBuzz()}});if(brigadeTime<=0){clearInterval(timer);let pts=Math.max(0,160-incidents*35);score+=pts;stageResult('Brigade terminée',pts,end,'brigade');return}renderBrigade()}function cool(i){zones[i].v=Math.max(8,zones[i].v-38);score+=8;iceHit();renderBrigade()}function saveFinal(){let scores=getScores();if(scores.some(s=>s.name===name))return scores; scores.push({name,score,stages:stageScores,date:new Date().toLocaleString('fr-FR')});scores.sort((a,b)=>b.score-a.score);setScores(scores);return scores}function end(){let scores=saveFinal();let myRank=scores.findIndex(s=>s.name===name)+1;let title=myRank===1?'👑 BF OFFICIEL':'🌡️ CANDIDAT FRAIS';let rows=scores.map((s,i)=>'<div class="row"><b>#'+(i+1)+' '+s.name+'</b><span>'+s.score+' pts</span></div>').join('');fanfare();speak(myRank===1?'Nomination officielle. '+name+' devient Boss du Frais.':'Fin du protocole pour '+name+'. Classement numéro '+myRank+'.',applause);app('<span class="badge">CLASSEMENT GÉNÉRAL</span><h1>'+title+'</h1><div class="ice">'+(myRank===1?'👑🧊':'🧊')+'</div><p>'+name+' : <b>'+score+' points</b><br>Rang final : <b>#'+myRank+'</b></p><div class="leader">'+rows+'</div><button class="btn dark" onclick="showPodium()">Voir podium officiel</button><button class="btn" onclick="boot()">Retour accueil</button><button class="btn" onclick="navigator.clipboard.writeText(\''+name+' : '+score+' points au protocole BF 🧊 Rang #'+myRank+'\')">Copier résultat</button>')}function showFinalRanking(){let scores=ranked();let rows=scores.length?scores.map((s,i)=>'<div class="row"><b>#'+(i+1)+' '+s.name+'</b><span>'+s.score+' pts</span></div>').join(''):'<p>Aucun participant enregistré pour le moment.</p>';fanfare();app('<span class="badge">CLASSEMENT GÉNÉRAL</span><h1>Tableau du froid</h1><div class="leader">'+rows+'</div><button class="btn dark" onclick="showPodium()">Podium officiel</button><button class="btn" onclick="boot()">Retour</button>')}function showPodium(){let s=ranked();let one=s[0],two=s[1],three=s[2];if(one){fanfare();speak('Mesdames et messieurs, cérémonie officielle. Le Boss du Frais provisoire est '+one.name+', avec '+one.score+' points. Le froid est sous contrôle.',applause);document.body.insertAdjacentHTML('beforeend','<div class="confetti"></div>');setTimeout(()=>document.querySelector('.confetti')?.remove(),4500)}let block=(p,medal,label,cls)=>'<div class="step '+cls+'"><span class="medal">'+medal+'</span><div>'+label+'</div><div>'+(p?p.name+'<br>'+p.score+' pts':'En attente')+'</div></div>';app('<span class="badge">CÉRÉMONIE OFFICIELLE</span><h1>Podium du froid</h1><div class="podium">'+block(two,'🥈','2e','second')+block(one,'👑','BF','first')+block(three,'🥉','3e','third')+'</div><p class="small">Le podium évolue tant que tous les participants n’ont pas joué.</p><button class="btn dark" onclick="boot()">Retour accueil</button><button class="btn" onclick="showFinalRanking()">Classement détaillé</button>')}boot()</script></body></html>
