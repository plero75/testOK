}async function end(){let scores=await saveFinal();let myRank=scores.findIndex(s=>s.name===name)+1;let title=myRank===1?'👑 BF PROVISOIRE':'🌡️ CANDIDAT FRAIS';let rows=scores.map((s,i)=>'<div class="row"><b>#'+(i+1)+' '+s.name+'</b><span>'+s.score+' pts</span></div>').join('');let remaining=participants.length-scores.length;playSound(remaining>0?'good':'miniWin',.8);speak('Score enregistré pour '+name+'. Classement actuel numéro '+myRank+'. '+(remaining>0?'Il reste '+remaining+' participant à faire passer avant la cérémonie officielle.':'Tous les participants ont joué. La cérémonie officielle peut commencer !'),remaining>0?null:applause);app('<span class="badge">CLASSEMENT '+(allPlayed()?'FINAL':'PROVISOIRE')+'</span><h1>'+title+'</h1><div class="ice">'+(myRank===1?'👑🧊':'🧊')+'</div><p>'+name+' : <b>'+score+' points</b><br>Rang actuel : <b>#'+myRank+'</b></p><div class="leader">'+rows+'</div><p class="small">'+scores.length+' / '+participants.length+' participants ont joué.</p><button class="btn dark" onclick="showPodium()">'+(allPlayed()?'Lancer la cérémonie officielle':'Voir podium provisoire')+'</button><button class="btn" onclick="boot()">Retour accueil</button><button class="btn" onclick="navigator.clipboard.writeText(\''+name+' : '+score+' points au protocole BF 🧊 Rang #'+myRank+'\')">Copier résultat</button>')}async function showFinalRanking(){await loadScores();let scores=ranked();let rows=scores.length?scores.map((s,i)=>'<div class="row"><b>#'+(i+1)+' '+s.name+'</b><span>'+s.score+' pts</span></div>').join(''):'<p>Aucun participant enregistré pour le moment.</p>';playSound('good',.55);app('<span class="badge">CLASSEMENT '+(allPlayed()?'FINAL':'PROVISOIRE')+'</span><h1>Tableau du froid</h1><p class="small">'+scores.length+' / '+participants.length+' participants ont joué.</p><div class="leader">'+rows+'</div><button class="btn dark" onclick="showPodium()">'+(allPlayed()?'Cérémonie officielle':'Podium provisoire')+'</button><button class="btn" onclick="boot()">Retour</button>')}async function showPodium(){await loadScores();let s=ranked();let one=s[0],two=s[1],three=s[2];let block=(p,medal,label,cls)=>'<div class="step '+cls+'"><span class="medal">'+medal+'</span><div>'+label+'</div><div>'+(p?p.name+'<br>'+p.score+' pts':'En attente')+'</div></div>';if(!allPlayed()){let miss=missingPlayers().join(', ');playSound('ooh',.85);speak('Podium provisoire uniquement. La cérémonie officielle est bloquée. Il manque '+miss+'.');app('<span class="badge">PODIUM PROVISOIRE</span><h1>En attente</h1><div class="podium">'+block(two,'🥈','2e','second')+block(one,'👑','Actuel BF','first')+block(three,'🥉','3e','third')+'</div><p class="comment">Cérémonie officielle verrouillée. Participants manquants : '+miss+'.</p><button class="btn dark" onclick="boot()">Retour accueil</button><button class="btn" onclick="showFinalRanking()">Classement détaillé</button>');return}let winner=one;victoryFanfare();document.body.insertAdjacentHTML('beforeend','<div class="confetti"></div>');setTimeout(()=>document.querySelector('.confetti')?.remove(),6500);setTimeout(()=>speak('Mesdames et messieurs, tous les contrôles sont terminés. Explosion de joie dans la glacière ! Le Boss du Frais officiel est '+winner.name+' avec '+winner.score+' points ! Bravo '+winner.name+' ! Le froid est maîtrisé, la chaîne est sauve, le jambon peut respirer !',applause),700);app('<span class="badge">CÉRÉMONIE OFFICIELLE</span><h1 class="victory">'+winner.name+' !</h1><div class="ice">👑🧊🎉</div><p><b>'+winner.name+'</b> est officiellement sacré Boss du Frais avec <b>'+winner.score+' points</b>.</p><div class="podium">'+block(two,'🥈','2e','second')+block(one,'👑','BF OFFICIEL','first')+block(three,'🥉','3e','third')+'</div><button class="btn dark" onclick="boot()">Retour accueil</button><button class="btn" onclick="showFinalRanking()">Classement détaillé</button>')}bootAsync()</script></body></html>
