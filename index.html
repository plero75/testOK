<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Boss du Frais</title><style>body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#eaffff,#5bc7e8 38%,#06182b);min-height:100vh;color:white;text-align:center;overflow:hidden}.wrap{max-width:620px;margin:auto;padding:22px}.card{background:rgba(255,255,255,.13);border:2px solid rgba(255,255,255,.35);border-radius:28px;padding:24px;box-shadow:0 25px 80px rgba(0,0,0,.35);backdrop-filter:blur(10px)}h1{font-size:42px;line-height:.95;margin:12px 0;text-transform:uppercase}.badge{display:inline-block;background:white;color:#063047;border-radius:999px;padding:9px 14px;font-weight:900}.ice{font-size:70px}.btn{border:0;border-radius:18px;padding:15px 18px;margin:8px;font-size:17px;font-weight:900;background:#fff;color:#063047;cursor:pointer}.btn.dark{background:#06263d;color:white}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.bar{height:34px;background:#fff;border-radius:999px;overflow:hidden;margin:20px}.fill{height:100%;width:50%;background:linear-gradient(90deg,#87f5ff,#006b9b)}.small{opacity:.9}.leader{background:rgba(0,0,0,.22);padding:14px;border-radius:18px;margin-top:16px;text-align:left}.row{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.16);padding:8px}.music{position:fixed;right:12px;top:12px}.product{font-size:42px}</style></head><body><button class="music" onclick="toggleMusic()">🎵 gêne glaçante</button><div class="wrap"><div class="card" id="app"><div class="ice">🧊</div><span class="badge">PROTOCOLE PRODUITS FRAIS</span><h1>Boss du Frais</h1><p>Mini-épreuves officielles de nomination du Responsable du Frais et de la Température Globale.</p><input id="name" placeholder="Ton prénom" style="padding:15px;border-radius:16px;border:0;font-size:18px;text-align:center;width:80%;max-width:360px"><br><button class="btn dark" onclick="start()">Lancer le protocole</button><p class="small">Classement stocké sur cet appareil. Pour le live multi-téléphones, brancher Supabase ensuite.</p></div></div><script>let score=0,name='',temp=0,dir=1,timer=null,audio=null;function beep(f,d,t){const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.frequency.value=f;o.type=t||'sine';o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(.0001,c.currentTime);g.gain.exponentialRampToValueAtTime(.08,c.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+d);o.start();o.stop(c.currentTime+d+.03)}function toggleMusic(){if(audio){audio.stop();audio=null;return}const c=new(window.AudioContext||window.webkitAudioContext)();let os=[];[146,185,220].forEach((f,i)=>{let o=c.createOscillator(),g=c.createGain();o.type=i?'triangle':'sine';o.frequency.value=f;g.gain.value=.025;o.connect(g);g.connect(c.destination);o.start();os.push(o)});setInterval(()=>beep(880,.08,'square'),2400);audio={stop:()=>{os.forEach(o=>o.stop());audio=null}}}function start(){name=document.getElementById('name').value||'Anonyme';score=0;gameTemp()}function gameTemp(){temp=12;dir=-1;document.getElementById('app').innerHTML='<span class="badge">ÉPREUVE 1</span><h1>Thermomètre Fou</h1><p>Arrête la température entre 0°C et 4°C.</p><div class="bar"><div class="fill" id="fill"></div></div><h2 id="t">12°C</h2><button class="btn dark" onclick="stopTemp()">STOP</button>';timer=setInterval(()=>{temp+=dir*.35;if(temp<=-2||temp>=12)dir*=-1;document.getElementById('t').innerText=temp.toFixed(1)+'°C';document.getElementById('fill').style.width=Math.max(0,Math.min(100,(temp+2)/14*100))+'%'},40)}function stopTemp(){clearInterval(timer);let pts=Math.max(0,Math.round(100-Math.abs(temp-4)*20));score+=pts;beep(pts>75?660:180,.2,'sawtooth');gameProducts()}function gameProducts(){let items=['🥓','🧀','🥬','🥛','🧻','☀️','🍷','🧊'];let html='<span class="badge">ÉPREUVE 2</span><h1>Sauve le Frais</h1><p>Clique uniquement les produits à protéger.</p><div class="grid">';items.forEach(x=>html+='<button class="btn product" onclick="pick(\''+x+'\')">'+x+'</button>');html+='</div>';document.getElementById('app').innerHTML=html}function pick(x){let good=['🥓','🧀','🥬','🥛','🧊'];score+=good.includes(x)?25:-20;beep(good.includes(x)?520:120,.12,'square');if(document.querySelectorAll('.product').length<=1)gameCrisis();event.target.remove()}function gameCrisis(){let cases=['Mayo au soleil','Glacière ouverte','Camembert qui sue','Loïc dit ça passe','PQ dans le frigo','Rosé tiède'];let c=cases[Math.floor(Math.random()*cases.length)];document.getElementById('app').innerHTML='<span class="badge">ÉPREUVE 3</span><h1>Inspection Frigo</h1><p>'+c+'</p><button class="btn dark" onclick="crisis(true)">ALERTE FRAIS</button><button class="btn" onclick="crisis(false)">RAS</button>'}function crisis(alert){score+=alert?50:-30;end()}function end(){let scores=JSON.parse(localStorage.getItem('bf_scores')||'[]');scores.push({name,score,date:new Date().toLocaleString('fr-FR')});scores.sort((a,b)=>b.score-a.score);localStorage.setItem('bf_scores',JSON.stringify(scores));let title=scores[0].name===name&&score===scores[0].score?'👑 BF OFFICIEL':'🌡️ CANDIDAT FRAIS';let rows=scores.slice(0,10).map((s,i)=>'<div class="row"><b>#'+(i+1)+' '+s.name+'</b><span>'+s.score+' pts</span></div>').join('');document.getElementById('app').innerHTML='<span class="badge">RÉSULTAT CONSOLIDÉ</span><h1>'+title+'</h1><div class="ice">'+(title.includes('BF')?'👑🧊':'🧊')+'</div><p>'+name+' : <b>'+score+' points</b></p><div class="leader">'+rows+'</div><button class="btn dark" onclick="location.reload()">Rejouer</button><button class="btn" onclick="navigator.clipboard.writeText(\''+name+' : '+score+' points au protocole BF 🧊\')">Copier résultat</button>'}</script></body></html>
